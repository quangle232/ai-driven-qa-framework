// Sample casino live-game gRPC contract.
//
// Demonstrates ALL FOUR RPC types a live-dealer / casino backend typically
// uses, so the client wrapper + mock + tests exercise every shape:
//   - unary               GetBalance, PlaceBet
//   - server-streaming    StreamGameState   (table phases pushed to the client)
//   - client-streaming    SendActions       (batch of player actions → summary)
//   - bidirectional       PlayLive          (interactive live round)
//
// Replace with your real protos; keep `grpc/models/casino.ts` in sync (or adopt
// buf + ts-proto for generated types — see grpc/README.md).
syntax = "proto3";

package casino.game.v1;

service GameService {
  // Unary — read the player's wallet balance.
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse);

  // Unary — place a bet (auth required; can fail with typed status codes).
  rpc PlaceBet(PlaceBetRequest) returns (PlaceBetResponse);

  // Server-streaming — subscribe to a table's game-state events.
  rpc StreamGameState(StreamGameStateRequest) returns (stream GameStateEvent);

  // Client-streaming — send a batch of actions, get a round summary.
  rpc SendActions(stream PlayerAction) returns (RoundSummary);

  // Bidirectional — interactive live play: actions in, events out.
  rpc PlayLive(stream PlayerAction) returns (stream GameStateEvent);
}

message GetBalanceRequest {
  string player_id = 1;
}

message BalanceResponse {
  string player_id = 1;
  int64 balance = 2;
  string currency = 3;
}

message PlaceBetRequest {
  string player_id = 1;
  string round_id = 2;
  int64 amount = 3;
  string market = 4;
}

message PlaceBetResponse {
  string bet_id = 1;
  bool accepted = 2;
  int64 balance_after = 3;
}

message StreamGameStateRequest {
  string table_id = 1;
}

message GameStateEvent {
  string table_id = 1;
  string phase = 2;     // betting | dealing | result | ack
  int64 sequence = 3;
  string payload = 4;   // opaque JSON
}

message PlayerAction {
  string player_id = 1;
  string action = 2;    // bet | hit | stand | ...
  int64 amount = 3;
}

message RoundSummary {
  string round_id = 1;
  int64 total_staked = 2;
  int64 net_result = 3;
  int32 action_count = 4;
}
